name: Continuous Integration & Deployment (GCP Cloud Run)

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch: # Дозволяє мануальний запуск або rollback

# Дозволи, необхідні для роботи Workload Identity Federation (OIDC)
permissions:
  id-token: write
  contents: read

jobs:
  # --- ЕТАП 1: ТЕСТУВАННЯ ТА СКАНУВАННЯ БЕЗПЕКИ ---
  security_scan:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-build-test:${{ github.sha }}'
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0' # Зміни на '1', якщо хочеш повністю блокувати деплой при знаходженні CRITICAL вразливостей
          severity: 'HIGH,CRITICAL'

  # --- ЕТАП 2: ДЕПЛОЙ НА СТЕДЖИНГ АБО ПРОДАКШЕН ---
  deploy:
    name: Build & Deploy Application
    needs: security_scan
    runs-on: ubuntu-latest
    
    # Динамічно обираємо GitHub Environment залежно від гілки
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Авторизація в Google Cloud через WIF (Без сервісних JSON ключів!)
      - name: Authenticate to Google Cloud via WIF
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 2. Налаштування Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 3. Налаштування Docker аутентифікації для Artifact Registry
      - name: Configure Docker for GCP
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      # 4. Зчитування секретів із GCP Secret Manager (наприклад, API_KEY або DB_PASSWORD)
      # Секрети будуть доступні як змінні оточення на наступних кроках
      - name: Fetch Secrets from GCP Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            DATABASE_URL:${{ secrets.GCP_PROJECT_ID }}/MY_APP_DB_URL

      # 5. Збірка Docker образу та Пуш в Artifact Registry
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-repository/${{ secrets.GCP_SERVICE_NAME }}:${{ github.sha }}
            europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-repository/${{ secrets.GCP_SERVICE_NAME }}:latest

      # 6. Деплой нового образу в Google Cloud Run
      - name: Deploy to Google Cloud Run
        id: cloud_run_deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ secrets.GCP_SERVICE_NAME }}
          region: europe-west3
          image: europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-repository/${{ secrets.GCP_SERVICE_NAME }}:${{ github.sha }}
          # Передаємо зчитаний з Secret Manager секрет в контейнер
          env_vars: |
            DATABASE_URL=${{ steps.secrets.outputs.DATABASE_URL }}

      # 7. АВТОМАТИЧНИЙ SMOKE TEST (Перевірка доступності сайту)
      - name: Execute Automated Smoke Test
        run: |
          URL="${{ steps.cloud_run_deploy.outputs.url }}"
          echo "Testing Application URL: $URL"
          
          # Робимо до 5 спроб стукнути по хелсчеку з інтервалом в 5 секунд
          for i in {1..5}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL/health" || echo "failed")
            if [ "$STATUS" == "200" ]; then
              echo "SUCCESS: Smoke test passed with status 200!"
              exit 0
            fi
            echo "Attempt $i: App returned status $STATUS. Retrying in 5s..."
            sleep 5
          done
          
          echo "ERROR: Smoke test failed! App is down or misconfigured."
          exit 1

      # 8. АВТОМАТИЧНИЙ ROLLBACK (Спрацьовує тільки якщо Smoke Test або Деплой впали)
      - name: Handle Automatic Rollback on Failure
        if: failure() && steps.cloud_run_deploy.outcome == 'success'
        run: |
          echo "Initiating automatic rollback to the previous stable revision..."
          
          # Отримуємо назву передостанньої успішної ревізії Cloud Run
          PREVIOUS_REVISION=$(gcloud run revisions list \
            --service=${{ secrets.GCP_SERVICE_NAME }} \
            --region=europe-west3 \
            --format="value(metadata.name)" | sed -n '2p')
          
          if [ -z "$PREVIOUS_REVISION" ]; then
            echo "No previous revision found to rollback to!"
            exit 1
          fi
          
          echo "Rolling back traffic to: $PREVIOUS_REVISION"
          gcloud run services update-traffic ${{ secrets.GCP_SERVICE_NAME }} \
            --region=europe-west3 \
            --to-revisions=$PREVIOUS_REVISION=100
