name: 🚀 Deploy to Google Cloud Run

'on':
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: 🏗️ Build & Deploy
    runs-on: ubuntu-latest
    
    # --- GitHub Actions автоматично підставить потрібне середовище ---
    environment: production  # Для стейджу просто зміни на: staging
    
    # --- ОДИН РАЗ ЗЧИТУЄМО ВСІ ЗМІННІ ТА СЕКРЕТИ СЕРЕДОВИЩА ---
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      SERVICE_NAME: ${{ vars.GCP_SERVICE_NAME }}
      REGION: europe-west1
      REPOSITORY: react-repo
      WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
      SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      IMAGE_NAME: europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/react-repo/${{ vars.GCP_SERVICE_NAME }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- ЕТАП БЕЗПЕКИ КОДУ ---
      - name: 🔐 Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔍 Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      # --- АВТЕНТИФІКАЦІЯ (Тепер повністю на універсальних env.*) ---
      - name: 🔐 Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: ⚙️ Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 🐳 Docker Auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # --- ЗЧИТУВАННЯ СЕКРЕТІВ З GCP SECRET MANAGER ---
      - name: 🔑 Fetch Secrets from GCP Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            API_KEY:${{ env.PROJECT_ID }}/REACT_APP_API_KEY

      # --- ЗБІРКА ТА ЛІНТИНГ ДОДАТКА ---
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint
        run: pnpm lint

      # --- ЗБІРКА КОНТЕЙНЕРА ТА СКАНУВАННЯ БЕЗПЕКИ ---
      - name: 🛠️ Build Local Container for Scan
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: 🛡️ Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          scan-type: 'image'
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: 📤 Push Container to Artifact Registry
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      # --- ДЕПЛОЙ НА GOOGLE CLOUD RUN ---
      - name: 🚀 Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          env_vars: |
            REACT_APP_API_KEY=${{ steps.secrets.outputs.API_KEY }}
          flags: >-
            --allow-unauthenticated
            --cpu=0.7
            --memory=128Mi
            --concurrency=1
            --min-instances=0
            --max-instances=1

      # --- АВТОМАТИЧНИЙ SMOKE TEST ---
      - name: 🔥 Smoke test
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Testing live application at: $URL"
          
          for i in {1..5}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL" || echo "failed")
            if [ "$STATUS" == "200" ]; then
              echo "✅ SUCCESS: Smoke test passed with status 200!"
              exit 0
            fi
            echo "⚠️ Attempt $i: App returned status $STATUS. Retrying..."
            sleep 3
          done
          
          echo "❌ ERROR: Smoke test failed! App is down."
          exit 1

      # --- АВТОМАТИЧНИЙ ROLLBACK ---
      - name: 🔄 Automatic Rollback on Failure
        if: failure() && steps.deploy.outcome == 'success'
        run: |
          echo "🚨 Smoke test failed! Initiating rollback..."
          
          PREVIOUS_REVISION=$(gcloud run revisions list \
            --service=${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format="value(metadata.name)" | sed -n '2p')
          
          if [ -z "$PREVIOUS_REVISION" ]; then
            echo "⛔ No previous revision found for rollback!"
            exit 1
          fi
          
          echo "🔄 Redirecting 100% of traffic to stable revision: $PREVIOUS_REVISION"
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --to-revisions=$PREVIOUS_REVISION=100
