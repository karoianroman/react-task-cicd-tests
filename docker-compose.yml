services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: react-app
    restart: unless-stopped
    # Замість ports використовуємо expose, щоб приховати сервіс за Nginx
    expose:
      - "8080"
    environment:
      # Замініть YOUR_SERVER_IP на реальний IP вашого сервера
      - VIRTUAL_HOST=app.35.241.228.193.nip.io
      - VIRTUAL_PORT=8080
      - LETSENCRYPT_HOST=app.35.241.228.193.nip.io
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    expose:
      - "9000"
    environment:
      # Замініть YOUR_SERVER_IP на реальний IP вашого сервера
      - VIRTUAL_HOST=portainer.YOUR_SERVER_IP.nip.io
      - VIRTUAL_PORT=9000
      - LETSENCRYPT_HOST=portainer.YOUR_SERVER_IP.nip.io
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # --- Nginx Reverse Proxy ---
  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - conf:/etc/nginx/conf.d
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - app-network

  # --- Let's Encrypt SSL Companion ---
  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-acme-companion
    restart: unless-stopped
    environment:
      # Вкажіть вашу реальну пошту для реєстрації сертифікатів Let's Encrypt
      - DEFAULT_EMAIL=romashka99k@gmail.com
    volumes_from:
      - nginx-proxy
    volumes:
      - certs:/etc/nginx/certs:rw
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network

volumes:
  portainer-data:
  conf:
  vhost:
  html:
  certs:
  acme:

networks:
  app-network:
    driver: bridge